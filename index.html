<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snooker Lab</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256163.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .floating-nav {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            left: 1rem;
            right: 1rem;
            height: 4.5rem;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .ball-btn {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.25rem;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4), inset 4px 4px 8px rgba(255,255,255,0.2);
            transition: transform 0.1s;
        }
        .ball-btn:active { transform: scale(0.9); }
        
        #update-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #10b981;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
        }

        .history-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans h-screen flex flex-col overflow-hidden">

    <div id="update-banner" onclick="window.location.reload()">
        Dostępna nowa wersja (1.0.6)! Odśwież 🚀
    </div>

    <!-- HEADER -->
    <header class="p-4 border-b border-slate-900 flex justify-between items-center bg-slate-950/80 backdrop-blur-md sticky top-0 z-20 pt-[env(safe-area-inset-top)]">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-900/20">
                <i class="fas fa-cue text-slate-900 text-xs"></i>
            </div>
            <h1 class="text-xl font-black tracking-tighter italic uppercase">SNOOKER<span class="text-emerald-500 font-light not-italic ml-0.5">LAB</span></h1>
        </div>
        <button id="back-btn" onclick="showView('home')" class="hidden bg-slate-800 px-3 py-1 rounded-full text-xs font-bold text-slate-400">
            <i class="fas fa-chevron-left mr-1"></i> WRÓĆ
        </button>
    </header>

    <!-- VIEW: HOME -->
    <main id="view-home" class="flex-1 overflow-y-auto p-5 space-y-6 pb-32">
        <section>
            <h2 class="text-2xl font-bold mb-1 tracking-tight">Cześć! 👋</h2>
            <p class="text-slate-400 text-sm font-medium">Co dziś trenujemy?</p>
        </section>

        <div class="grid grid-cols-1 gap-4">
            <button onclick="startDrill('Dowolne wbijanie')" class="drill-card text-left bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-xl flex items-center space-x-4 transition-all active:bg-slate-800">
                <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 text-2xl">
                    <i class="fas fa-random"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight">Dowolne wbijanie</h3>
                    <p class="text-slate-500 text-xs italic">Breaki i czysty fun.</p>
                </div>
            </button>
            <button onclick="startDrill('Line-up')" class="drill-card text-left bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-xl flex items-center space-x-4 transition-all active:bg-slate-800">
                <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-2xl">
                    <i class="fas fa-align-center"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-lg leading-tight">Line-up</h3>
                    <p class="text-slate-500 text-xs italic">Klasyczna kontrola bili.</p>
                </div>
            </button>
        </div>
    </main>

    <!-- VIEW: ANALYTICS -->
    <main id="view-analytics" class="hidden flex-1 overflow-y-auto p-5 space-y-6 pb-32">
        <h2 class="text-2xl font-bold mb-4 tracking-tight">Twoja Historia</h2>
        <div id="history-list" class="space-y-4">
            <p class="text-slate-600 text-center py-10 italic">Brak zapisanych treningów.</p>
        </div>
    </main>

    <!-- VIEW: SETTINGS -->
    <main id="view-settings" class="hidden flex-1 overflow-y-auto p-5 space-y-6 pb-32 text-center">
        <h2 class="text-2xl font-bold">Opcje</h2>
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4 text-left">
            <button onclick="clearAllData()" class="w-full text-rose-500 text-sm font-bold uppercase py-2 tracking-widest">Wyczyść historię</button>
        </div>
        <div class="pt-20 opacity-30">
            <p class="text-[10px] font-black uppercase tracking-widest mb-1">Wersja Aplikacji</p>
            <p class="font-mono text-sm font-bold text-emerald-500">v1.0.6</p>
        </div>
    </main>

    <!-- VIEW: TRAINING -->
    <main id="view-training" class="hidden flex-1 overflow-y-auto p-4 space-y-6 pb-40">
        <div class="flex justify-between items-end px-1">
            <div>
                <span id="active-drill-name" class="text-emerald-500 text-[10px] font-black uppercase tracking-[0.2em]">DRILL</span>
                <h2 class="text-xl font-bold">Sesja w toku</h2>
            </div>
            <div id="session-timer" class="text-sm font-mono text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">00:00</div>
        </div>

        <!-- Scoreboard -->
        <div class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800 text-center">
            <div class="grid grid-cols-3 gap-2">
                <div class="border-r border-slate-800">
                    <p class="text-slate-500 text-[8px] uppercase font-black tracking-widest mb-1">Break</p>
                    <p id="current-break" class="text-4xl font-black text-white font-mono tabular-nums">0</p>
                </div>
                <div class="border-r border-slate-800">
                    <p class="text-slate-500 text-[8px] uppercase font-black tracking-widest mb-1">Wbite</p>
                    <p id="pots-count" class="text-4xl font-black text-emerald-400 font-mono tabular-nums">0</p>
                </div>
                <div>
                    <p class="text-slate-500 text-[8px] uppercase font-black tracking-widest mb-1">Pudła</p>
                    <p id="miss-count" class="text-4xl font-black text-rose-500 font-mono tabular-nums">0</p>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-4 gap-4 px-2">
            <button onclick="handleBall(1, 'bg-red-600')" class="ball-btn bg-red-600 text-white">1</button>
            <button onclick="handleBall(2, 'bg-yellow-400')" class="ball-btn bg-yellow-400 text-slate-900">2</button>
            <button onclick="handleBall(3, 'bg-green-600')" class="ball-btn bg-green-600 text-white">3</button>
            <button onclick="handleBall(4, 'bg-amber-700')" class="ball-btn bg-amber-700 text-white">4</button>
            <button onclick="handleBall(5, 'bg-blue-600')" class="ball-btn bg-blue-600 text-white">5</button>
            <button onclick="handleBall(6, 'bg-pink-500')" class="ball-btn bg-pink-500 text-white">6</button>
            <button onclick="handleBall(7, 'bg-zinc-900')" class="ball-btn bg-zinc-900 text-white border border-slate-700">7</button>
            <button onclick="handleMiss()" class="ball-btn bg-slate-800 text-rose-500"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div class="px-2">
            <button onclick="resetRun()" class="w-full bg-slate-900 border border-slate-800 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 active:bg-slate-800">
                <i class="fas fa-redo-alt mr-2"></i> Nowe podejście / Reset stołu
            </button>
        </div>

        <div class="space-y-2">
            <h3 class="text-[10px] font-black text-slate-600 uppercase tracking-widest px-1 text-center">Aktualny Break</h3>
            <div id="shots-log" class="flex space-x-2 overflow-x-auto pb-4 no-scrollbar min-h-[3rem] justify-center"></div>
        </div>
        
        <button onclick="endSession()" class="w-full py-4 text-slate-500 text-[10px] font-black uppercase tracking-widest">
            Zakończ sesję
        </button>
    </main>

    <!-- FLOATING NAV -->
    <nav class="floating-nav">
        <button onclick="showView('home')" id="nav-home" class="flex flex-col items-center p-2 text-emerald-500">
            <i class="fas fa-bullseye text-xl"></i>
            <span class="text-[8px] mt-1 font-black uppercase">Start</span>
        </button>
        <button onclick="showView('analytics')" id="nav-analytics" class="flex flex-col items-center p-2 text-slate-500">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[8px] mt-1 font-black uppercase">Postęp</span>
        </button>
        <button onclick="showView('settings')" id="nav-settings" class="flex flex-col items-center p-2 text-slate-500">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[8px] mt-1 font-black uppercase">Opcje</span>
        </button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                document.getElementById('update-banner').style.display = 'block';
                            }
                        });
                    });
                });
            });
        }

        let state = {
            currentView: 'home',
            drillName: '',
            breakScore: 0,
            maxBreak: 0,
            totalPots: 0,
            totalMisses: 0,
            startTime: null,
            timerInterval: null
        };

        function showView(viewName) {
            state.currentView = viewName;
            document.getElementById('view-home').classList.toggle('hidden', viewName !== 'home');
            document.getElementById('view-training').classList.toggle('hidden', viewName !== 'training');
            document.getElementById('view-settings').classList.toggle('hidden', viewName !== 'settings');
            document.getElementById('view-analytics').classList.toggle('hidden', viewName !== 'analytics');
            
            document.getElementById('back-btn').classList.toggle('hidden', viewName === 'home' || viewName === 'settings' || viewName === 'analytics');
            
            document.getElementById('nav-home').classList.toggle('text-emerald-500', viewName === 'home');
            document.getElementById('nav-home').classList.toggle('text-slate-500', viewName !== 'home');
            document.getElementById('nav-analytics').classList.toggle('text-emerald-500', viewName === 'analytics');
            document.getElementById('nav-analytics').classList.toggle('text-slate-500', viewName !== 'analytics');
            document.getElementById('nav-settings').classList.toggle('text-emerald-500', viewName === 'settings');
            document.getElementById('nav-settings').classList.toggle('text-slate-500', viewName !== 'settings');

            if (viewName === 'analytics') renderHistory();
            if (viewName === 'home') clearInterval(state.timerInterval);
        }

        function startDrill(name) {
            state.drillName = name;
            state.breakScore = 0;
            state.maxBreak = 0;
            state.totalPots = 0;
            state.totalMisses = 0;
            state.startTime = new Date();
            document.getElementById('active-drill-name').innerText = name;
            document.getElementById('shots-log').innerHTML = '';
            updateUI();
            showView('training');
            startTimer();
        }

        function handleBall(points, colorClass) {
            vibrate(15);
            state.breakScore += points;
            state.totalPots++;
            if (state.breakScore > state.maxBreak) state.maxBreak = state.breakScore;
            
            const log = document.getElementById('shots-log');
            const item = document.createElement('div');
            item.className = `w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-black text-sm shadow-lg animate-in zoom-in duration-200 ${colorClass} ${points === 2 || points === 7 ? 'text-slate-900' : 'text-white'}`;
            item.innerText = points;
            log.prepend(item);
            updateUI();
        }

        function handleMiss() {
            vibrate([30, 50]);
            state.totalMisses++;
            state.breakScore = 0;
            // Nie czyścimy loga breaka przy samym pudle, bo user chce widzieć jak szło, dopóki nie zresetuje stołu
            updateUI();
        }

        function resetRun() {
            vibrate(30);
            state.breakScore = 0;
            document.getElementById('shots-log').innerHTML = '';
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-break').innerText = state.breakScore;
            document.getElementById('pots-count').innerText = state.totalPots;
            document.getElementById('miss-count').innerText = state.totalMisses;
        }

        function endSession() {
            if (state.totalPots === 0 && state.totalMisses === 0) {
                showView('home');
                return;
            }
            
            if(confirm('Zakończyć i zapisać sesję?')) {
                const session = {
                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    drill: state.drillName,
                    maxBreak: state.maxBreak,
                    pots: state.totalPots,
                    misses: state.totalMisses,
                    time: document.getElementById('session-timer').innerText
                };
                
                const history = JSON.parse(localStorage.getItem('snookerHistory') || '[]');
                history.unshift(session);
                localStorage.setItem('snookerHistory', JSON.stringify(history.slice(0, 50)));
                showView('home');
            }
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('snookerHistory') || '[]');
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = '<p class="text-slate-600 text-center py-10 italic">Brak zapisanych treningów.</p>';
                return;
            }
            list.innerHTML = history.map(s => `
                <div class="history-card">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${s.drill}</p>
                            <p class="text-xs text-slate-500">${s.date}</p>
                        </div>
                        <div class="text-right font-mono text-sm text-slate-400">${s.time}</div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-slate-950/50 rounded-xl p-2 text-center">
                            <p class="text-[7px] uppercase text-slate-600 font-bold mb-1">Max Break</p>
                            <p class="text-lg font-black text-white">${s.maxBreak}</p>
                        </div>
                        <div class="bg-slate-950/50 rounded-xl p-2 text-center">
                            <p class="text-[7px] uppercase text-slate-600 font-bold mb-1">Wbite</p>
                            <p class="text-lg font-black text-emerald-400">${s.pots}</p>
                        </div>
                        <div class="bg-slate-950/50 rounded-xl p-2 text-center">
                            <p class="text-[7px] uppercase text-slate-600 font-bold mb-1">Pudła</p>
                            <p class="text-lg font-black text-rose-500">${s.misses || 0}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function clearAllData() {
            if(confirm('Czy na pewno chcesz usunąć całą historię treningów?')) {
                localStorage.removeItem('snookerHistory');
                renderHistory();
            }
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                const diff = Math.floor((new Date() - state.startTime) / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('session-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function vibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }
    </script>
</body>
</html>
